name: build-and-push

on:
  push:
    branches: ["dev"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=sha
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: mohyeonMan/home-k3s-infra
          ref: main
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update kustomization tag
        run: |
          cd infra
          TARGET_FILE="apps/kopic/ws/kustomization.yaml"

          if [ ! -f "${TARGET_FILE}" ]; then
            echo "skip infra tag update because ${TARGET_FILE} does not exist yet"
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          yq -i ".images[0].newTag = \"sha-${SHORT_SHA}\"" "${TARGET_FILE}"

      - name: Commit and push
        run: |
          cd infra
          TARGET_FILE="apps/kopic/ws/kustomization.yaml"

          if [ ! -f "${TARGET_FILE}" ]; then
            echo "skip infra push because ${TARGET_FILE} does not exist yet"
            exit 0
          fi

          SHORT_SHA="${GITHUB_SHA::7}"
          REPO_NAME="${GITHUB_REPOSITORY##*/}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add "${TARGET_FILE}"
          git commit -m "deployment: ${REPO_NAME} image tag [sha-${SHORT_SHA}]" || exit 0
          git push
