services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: kopic-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: kopic
      RABBITMQ_DEFAULT_PASS: kopic123
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  rabbitmq-data:
